[workspace]
resolver = "2"
members = [
    "crates/pandox-web",
    "crates/pandox-ui",
    "crates/pandox-markdown",
    "crates/pandox-macros",
]

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
dioxus = "0.7"
pandox-ui = { path = "crates/pandox-ui" }
pandox-web = { path = "crates/pandox-web" }
pandox-markdown = { path = "crates/pandox-markdown" }
pandox-macros = { path = "crates/pandox-macros" }
